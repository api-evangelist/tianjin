aid: tianjin
name: Tianjin University
description: >-
  Tianjin University (TJU) is a national public research university in Tianjin,
  China, founded in 1895 as Peiyang University and recognized as the oldest
  modern university in China. It is ranked #269 in the QS World University
  Rankings 2025. TJU operates the usual institutional web properties (official
  site, library OPAC, faculty and international-cooperation portals) but does
  not publish a public developer portal or documented, openly accessible API.
  No public API documentation, base URLs, or sign-up flows could be verified at
  the time of cataloging; the entries below reflect only confirmed public web
  properties, not documented APIs.
